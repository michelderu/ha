              icon: mdi:water-percent
              primary: Luchtvochtigheid Woonkamer
              secondary: '{{ states(entity) | int }} %'
              color: >
                {% set state = states(entity) | float(0) %} {% if state < 30 or
                state > 70 %}red{% elif state < 40 or state > 60 %}orange{% else
                %}green{% endif %}
              tap_action:
                action: more-info
