views:
  - title: Binnenklimaat
    type: sections
    max_columns: 1
    sections:
      - type: grid
        card_mod:
          style: |
            ha-card {
              max-width: 1200px;
              margin: 0 auto;
            }
        cards:
          # Show current weather card
          - show_current: true
            show_forecast: false
            type: weather-forecast
            entity: weather.forecast_thuis
            forecast_type: daily
          # Show "Het binnenklimaat is prima ✓" card if all sensors are in good condition
          - type: conditional
            conditions:
              - condition: not
                conditions:
                  - condition: or
                    conditions:
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_kooldioxide
                        above: 999
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_pm2_5
                        above: 9.9
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_luchtvochtigheid
                        below: 40
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_luchtvochtigheid
                        above: 60
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_temperatuur
                        below: 12
                      - condition: numeric_state
                        entity: sensor.woonkamer_air_temperatuur
                        above: 22
                      - condition: numeric_state
                        entity: sensor.paula_michel_air_kooldioxide
                        above: 999
                      - condition: numeric_state
                        entity: sensor.paula_michel_air_pm2_5
                        above: 9.9
                      - condition: numeric_state
                        entity: sensor.paula_michel_air_luchtvochtigheid
                        below: 40
