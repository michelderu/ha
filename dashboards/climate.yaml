                      - condition: numeric_state
                        entity: sensor.paula_michel_air_temperatuur
                        above: 22
                      - condition: numeric_state
                        entity: sensor.linde_air_kooldioxide
                        above: 999
                      - condition: numeric_state
                        entity: sensor.linde_air_pm2_5
                        above: 9.9
                      - condition: numeric_state
                        entity: sensor.linde_air_luchtvochtigheid
                        below: 40
                      - condition: numeric_state
                        entity: sensor.linde_air_luchtvochtigheid
                        above: 60
                      - condition: numeric_state
                        entity: sensor.linde_air_temperatuur
                        below: 12
                      - condition: numeric_state
                        entity: sensor.linde_air_temperatuur
                        above: 22
                      - condition: numeric_state
                        entity: sensor.jongens_air_kooldioxide
                        above: 999
                      - condition: numeric_state
                        entity: sensor.jongens_air_pm2_5
                        above: 9.9
