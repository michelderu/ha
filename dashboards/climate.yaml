            card:
              type: heading
              heading: Aandacht vereist
              heading_style: title
          # Start alerts
          - type: conditional # CO2 Woonkamer
            conditions:
              - condition: numeric_state
                entity: sensor.woonkamer_air_kooldioxide
                above: 999
            card:
              type: custom:mushroom-template-card
              entity: sensor.woonkamer_air_kooldioxide
              icon: mdi:molecule-co2
              primary: CO2 Woonkamer
              secondary: '{{ states(entity) | int }} ppm'
              color: >
                {% set state = states(entity) | int(0) %} {% if state < 1000
                %}green{% elif state < 1500 %}orange{% else %}red{% endif %}
              tap_action:
                action: more-info
          - type: conditional # Fijnstof Woonkamer
            conditions:
              - condition: numeric_state
                entity: sensor.woonkamer_air_pm2_5
                above: 9.9
            card:
              type: custom:mushroom-template-card
              entity: sensor.woonkamer_air_pm2_5
              icon: mdi:air-filter
              primary: Fijnstof Woonkamer
              secondary: '{{ states(entity) | int }} µg/m³'
              color: >
                {% set state = states(entity) | float(0) %} {% if state < 10
                %}green{% elif state < 25 %}orange{% else %}red{% endif %}
              tap_action:
                action: more-info
          - type: conditional # Luchtvochtigheid Woonkamer
